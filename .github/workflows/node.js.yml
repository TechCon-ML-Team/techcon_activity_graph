# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version: [22.x]
        steps:
            - uses: actions/checkout@v4
            - name: create env file
              run: |
                  touch .env
                  echo TOKEN=${{ secrets.TOKEN }} >> .env
            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node-version }}
            - run: npm ci
            - run: npm test

    notify-hub:
        name: Notify TechCon Hub
        runs-on: ubuntu-latest
        needs: build
        if: needs.build.result == 'success' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        steps:
            - name: Dispatch knowledge sync
              uses: actions/github-script@60a0d83039f74a4f479b5f76fecfa5d9aca7ed73  # v7
              with:
                  github-token: ${{ secrets.TECHCON_HUB_DISPATCH_TOKEN }}
                  script: |
                      await github.rest.repos.createDispatchEvent({
                        owner: 'TechCon-ML-Team',
                        repo: 'techcon_hub',
                        event_type: 'knowledge-sync-requested',
                        client_payload: {
                          repo_name: '${{ github.event.repository.name }}',
                          source_workflow: '${{ github.workflow }}',
                          source_event: '${{ github.event_name }}',
                          source_ref: '${{ github.ref }}',
                          source_sha: '${{ github.sha }}',
                          source_run_id: '${{ github.run_id }}'
                        }
                      });
